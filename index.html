const CAT_D = { School:{bg:'rgba(99,102,241,0.2)',text:'#a5b4fc',dot:'#818cf8'}, Work:{bg:'rgba(59,130,246,0.2)',text:'#93c5fd',dot:'#60a5fa'}, Life:{bg:'rgba(16,185,129,0.18)',text:'#6ee7b7',dot:'#34d399'} };
const CAT_L = { School:{bg:'rgba(99,102,241,0.12)',text:'#4338ca',dot:'#6366f1'}, Work:{bg:'rgba(59,130,246,0.12)',text:'#1d4ed8',dot:'#3b82f6'}, Life:{bg:'rgba(16,185,129,0.12)',text:'#047857',dot:'#10b981'} };
const PRI_D = { high:{bg:'rgba(239,68,68,0.17)',text:'#fca5a5',dot:'#ef4444'}, medium:{bg:'rgba(245,158,11,0.17)',text:'#fcd34d',dot:'#f59e0b'}, low:{bg:'rgba(99,102,241,0.17)',text:'#a5b4fc',dot:'#818cf8'} };
const PRI_L = { high:{bg:'rgba(239,68,68,0.1)',text:'#dc2626',dot:'#ef4444'}, medium:{bg:'rgba(245,158,11,0.1)',text:'#b45309',dot:'#f59e0b'}, low:{bg:'rgba(99,102,241,0.1)',text:'#4338ca',dot:'#6366f1'} };

const REPEAT_OPTS = ['none','daily','weekly','biweekly','monthly'];
const REPEAT_LBL  = { none:'No repeat', daily:'Daily', weekly:'Weekly', biweekly:'Bi-weekly', monthly:'Monthly' };
const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const dayKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const addMonths = (d,n) => { const r=new Date(d); r.setMonth(r.getMonth()+n); return r; };
const sameDay = (a,b) => dayKey(a)===dayKey(b);
const nextRecur = (dateStr,repeat) => {
  const d=new Date(dateStr+'T00:00:00');
  if(repeat==='daily')    return dayKey(addDays(d,1));
  if(repeat==='weekly')   return dayKey(addDays(d,7));
  if(repeat==='biweekly') return dayKey(addDays(d,14));
  if(repeat==='monthly')  return dayKey(addMonths(d,1));
  return null;
};

// ─── Firestore ↔ UI field adapter ──────────────────────────────────────────
// Firestore docs use {cat, pri, rec, title, date, time, note, done, order}
// UI components use {category, priority, repeat, ...} with Title-cased category.
const CAT_TO_UI = { school:'School', work:'Work', life:'Life' };
const CAT_TO_DB = { School:'school', Work:'work', Life:'life' };

const fromDoc = (d, id) => ({
  id,
  title: d.title || '',
  category: CAT_TO_UI[d.cat] || 'Work',
  priority: d.pri || 'medium',
  date: d.date || '',
  time: d.time || '',
  note: d.note || '',
  repeat: d.rec || 'none',
  done: !!d.done,
  order: d.order || 0,
});

const toDoc = t => ({
  title: t.title,
  cat: CAT_TO_DB[t.category] || 'work',
  pri: t.priority,
  date: t.date || '',
  time: t.time || '',
  note: t.note || '',
  rec: t.repeat || 'none',
  done: !!t.done,
});

// ─── Media query hook for responsive layout ────────────────────────────────
function useMedia(query) {
  const [matches, setMatches] = useState(() => window.matchMedia(query).matches);
  useEffect(() => {
    const m = window.matchMedia(query);
    const fn = e => setMatches(e.matches);
    m.addEventListener('change', fn);
    return () => m.removeEventListener('change', fn);
  }, [query]);
  return matches;
}

// ─── Local preferences (theme, accent, compact, showNotes) ─────────────────
const PREFS_KEY = 'schedule_prefs_v1';
const DEFAULT_PREFS = { accentColor: '#5b8dee', compact: false, showNotes: true, darkMode: true };

function usePrefs() {
  const [prefs, setPrefs] = useState(() => {
    try {
      const raw = localStorage.getItem(PREFS_KEY);
      return raw ? { ...DEFAULT_PREFS, ...JSON.parse(raw) } : DEFAULT_PREFS;
    } catch { return DEFAULT_PREFS; }
  });
  const setPref = (key, val) => setPrefs(p => {
    const next = { ...p, [key]: val };
    try { localStorage.setItem(PREFS_KEY, JSON.stringify(next)); } catch {}
    return next;
  });
  return [prefs, setPref];
}

// ─── Firestore tasks hook ──────────────────────────────────────────────────
function useFirestoreTasks(user) {
  const [tasks, setTasks] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [syncState, setSyncState] = useState('connecting'); // 'connecting' | 'ok' | 'err' | 'saving'
  const unsubRef = useRef(null);

  useEffect(() => {
    if (!user) {
      setTasks([]); setLoaded(false); setSyncState('connecting');
      if (unsubRef.current) { unsubRef.current(); unsubRef.current = null; }
      return;
    }
    setSyncState('connecting');
    const col = FB.collection(FB.db, 'users', user.uid, 'tasks');
    const unsub = FB.onSnapshot(col, snap => {
      const next = snap.docs
        .map(d => fromDoc(d.data(), d.id))
        .sort((a, b) => (a.order || 0) - (b.order || 0));
      setTasks(next);
      setLoaded(true);
      setSyncState('ok');
    }, err => {
      console.error('Firestore error:', err);
      setSyncState('err');
    });
    unsubRef.current = unsub;
    return () => { unsub(); unsubRef.current = null; };
  }, [user?.uid]);

  const col = () => FB.collection(FB.db, 'users', user.uid, 'tasks');
  const d1  = id => FB.doc(FB.db, 'users', user.uid, 'tasks', id);

  const withSync = async (fn) => {
    setSyncState('saving');
    try { await fn(); setSyncState('ok'); }
    catch (e) { console.error(e); setSyncState('err'); }
  };

  const addTask = (task) => withSync(async () => {
    await FB.addDoc(col(), {
      ...toDoc(task),
      order: Date.now(),
      createdAt: FB.serverTimestamp(),
    });
  });

  const updateTask = (id, patch) => withSync(async () => {
    // patch is in UI shape; convert known fields
    const fsPatch = {};
    if ('title'    in patch) fsPatch.title = patch.title;
    if ('category' in patch) fsPatch.cat   = CAT_TO_DB[patch.category] || 'work';
    if ('priority' in patch) fsPatch.pri   = patch.priority;
    if ('date'     in patch) fsPatch.date  = patch.date || '';
    if ('time'     in patch) fsPatch.time  = patch.time || '';
    if ('note'     in patch) fsPatch.note  = patch.note || '';
    if ('repeat'   in patch) fsPatch.rec   = patch.repeat || 'none';
    if ('done'     in patch) fsPatch.done  = !!patch.done;
    if ('order'    in patch) fsPatch.order = patch.order;
    await FB.updateDoc(d1(id), fsPatch);
  });

  const deleteTask = (id) => withSync(async () => {
    await FB.deleteDoc(d1(id));
  });

  // Toggle done; if completing a recurring task, spawn the next occurrence.
  const toggleTask = (id) => withSync(async () => {
    const t = tasks.find(x => x.id === id);
    if (!t) return;
    if (!t.done && t.repeat && t.repeat !== 'none' && t.date) {
      const nd = nextRecur(t.date, t.repeat);
      if (nd) {
        await FB.addDoc(col(), {
          ...toDoc({ ...t, date: nd, done: false }),
          order: Date.now(),
          createdAt: FB.serverTimestamp(),
        });
      }
    }
    await FB.updateDoc(d1(id), { done: !t.done });
  });

  // Reorder: rewrites `order` on every affected doc in one batch.
  const reorderTasks = (newOrder) => withSync(async () => {
    const batch = FB.writeBatch(FB.db);
    newOrder.forEach((t, i) => batch.update(d1(t.id), { order: i }));
    await batch.commit();
  });

  return { tasks, loaded, syncState, addTask, updateTask, deleteTask, toggleTask, reorderTasks };
}

// ─── Sync indicator ────────────────────────────────────────────────────────
function SyncDot({ state }) {
  const T = useTheme();
  const map = {
    connecting: { color: T.textSub, label: 'Connecting…', anim: 'pulse 1s infinite' },
    saving:     { color: '#f59e0b', label: 'Saving…',     anim: 'pulse 1s infinite' },
    ok:         { color: '#1D9E75', label: 'Synced',      anim: 'none' },
    err:        { color: '#ef4444', label: 'Offline',     anim: 'none' },
  };
  const { color, label, anim } = map[state] || map.connecting;
  return (
    <div style={{ display:'flex', alignItems:'center', gap:6 }} title={label}>
      <span style={{ width:7, height:7, borderRadius:'50%', background:color, animation:anim, display:'inline-block' }} />
      <span style={{ fontSize:11, color:T.textSub }}>{label}</span>
    </div>
  );
}

// ─── Custom DatePicker ────────────────────────────────────────────────────
function DatePicker({ value, onChange }) {
  const T = useTheme();
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  const parsed = value ? new Date(value + 'T00:00:00') : new Date(TODAY);
  const [viewMonth, setViewMonth] = useState(parsed.getMonth());
  const [viewYear,  setViewYear]  = useState(parsed.getFullYear());

  useEffect(() => {
    if (!open) return;
    const fn = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', fn);
    return () => document.removeEventListener('mousedown', fn);
  }, [open]);

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push({ day: daysInPrev - firstDay + i + 1, cur: false });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, cur: true });
  while (cells.length < 35) cells.push({ day: cells.length - firstDay - daysInMonth + 1, cur: false });

  const displayDate = value
    ? new Date(value + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
    : 'Pick a date';

  const fieldStyle = {
    background: T.surface2, border: `1px solid ${T.border2}`, borderRadius: 8,
    color: value ? T.text : T.textSub, padding: '9px 12px', fontSize: 14, width: '100%',
    cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'space-between', userSelect: 'none',
  };

  return (
    <div ref={ref} style={{ position: 'relative' }}>
      <div style={fieldStyle} onClick={() => setOpen(o => !o)}>
        <span>{displayDate}</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={T.textSub} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      {open && (
        <div style={{ position: 'absolute', top: 'calc(100% + 6px)', left: 0, zIndex: 300, background: T.surface, border: `1px solid ${T.border2}`, borderRadius: 14, padding: 14, width: 260, boxShadow: `0 16px 48px ${T.shadow}` }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
            <button onClick={() => { if (viewMonth === 0) { setViewMonth(11); setViewYear(y => y-1); } else setViewMonth(m => m-1); }}
              style={{ background: T.surface2, border: `1px solid ${T.border}`, borderRadius: 7, width: 28, height: 28, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="chevLeft" size={13} color={T.textSub}/>
            </button>
            <span style={{ fontWeight: 600, fontSize: 13, color: T.text }}>{MONTHS_LONG[viewMonth].slice(0,3)} {viewYear}</span>
            <button onClick={() => { if (viewMonth === 11) { setViewMonth(0); setViewYear(y => y+1); } else setViewMonth(m => m+1); }}
              style={{ background: T.surface2, border: `1px solid ${T.border}`, borderRadius: 7, width: 28, height: 28, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="chevRight" size={13} color={T.textSub}/>
            </button>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', marginBottom: 6 }}>
            {['S','M','T','W','T','F','S'].map((d,i) => (
              <div key={i} style={{ textAlign: 'center', fontSize: 10, color: T.textSub, fontWeight: 600 }}>{d}</div>
            ))}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: 2 }}>
            {cells.map((cell, i) => {
              const k = cell.cur ? `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}` : null;
              const isSelected = k === value;
              const isToday2 = k === dayKey(TODAY);
              return (
                <button key={i} onClick={() => { if (k) { onChange(k); setOpen(false); } }}
                  disabled={!cell.cur}
                  style={{
                    width: '100%', aspectRatio: '1', borderRadius: 6, border: 'none',
                    background: isSelected ? T.accent : isToday2 ? T.accentSoft : 'transparent',
                    color: isSelected ? '#fff' : isToday2 ? T.accent : cell.cur ? T.text : T.textDim,
                    fontWeight: isSelected || isToday2 ? 600 : 400, fontSize: 12,
                    cursor: cell.cur ? 'pointer' : 'default', transition: 'background .1s',
                    fontFamily: 'Inter, sans-serif',
                  }}>
                  {cell.cur ? cell.day : ''}
                </button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Custom TimePicker ────────────────────────────────────────────────────
function TimePicker({ value, onChange }) {
  const T = useTheme();
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const hrRef = useRef(null);
  const mnRef = useRef(null);

  const hours   = Array.from({ length: 24 }, (_, i) => String(i).padStart(2, '0'));
  const minutes = Array.from({ length: 12 }, (_, i) => String(i * 5).padStart(2, '0'));

  const [selH, selM] = value ? value.split(':') : ['09', '00'];

  useEffect(() => {
    if (!open) return;
    const fn = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', fn);
    return () => document.removeEventListener('mousedown', fn);
  }, [open]);

  useEffect(() => {
    if (!open) return;
    setTimeout(() => {
      if (hrRef.current) { const el = hrRef.current.querySelector('[data-sel="1"]'); if (el) el.scrollIntoView({ block: 'center' }); }
      if (mnRef.current) { const el = mnRef.current.querySelector('[data-sel="1"]'); if (el) el.scrollIntoView({ block: 'center' }); }
    }, 50);
  }, [open]);

  const displayTime = value || 'Pick a time';
  const fieldStyle = {
    background: T.surface2, border: `1px solid ${T.border2}`, borderRadius: 8,
    color: value ? T.text : T.textSub, padding: '9px 12px', fontSize: 14, width: '100%',
    cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'space-between', userSelect: 'none',
  };

  const colStyle = { width: 52, maxHeight: 200, overflowY: 'auto', scrollbarWidth: 'none' };
  const itemStyle = (active) => ({
    padding: '7px 0', textAlign: 'center', fontSize: 13, fontWeight: active ? 700 : 400,
    color: active ? T.accent : T.text, background: active ? T.accentSoft : 'transparent',
    borderRadius: 7, cursor: 'pointer', transition: 'background .1s',
  });

  return (
    <div ref={ref} style={{ position: 'relative' }}>
      <div style={fieldStyle} onClick={() => setOpen(o => !o)}>
        <span>{displayTime}</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={T.textSub} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      {open && (
        <div style={{ position: 'absolute', top: 'calc(100% + 6px)', left: 0, zIndex: 300, background: T.surface, border: `1px solid ${T.border2}`, borderRadius: 14, padding: '10px 6px', boxShadow: `0 16px 48px ${T.shadow}`, display: 'flex', flexDirection: 'column', alignItems: 'center', width: 130 }}>
          <div style={{ fontSize: 10, color: T.textSub, fontWeight: 600, letterSpacing: '0.06em', marginBottom: 8, display: 'flex', gap: 28 }}>
            <span>HR</span><span>MIN</span>
          </div>
          <div style={{ display: 'flex', gap: 4 }}>
            <div ref={hrRef} style={colStyle}>
              {hours.map(h => (
                <div key={h} data-sel={h===selH?'1':undefined}
                  style={itemStyle(h===selH)}
                  onClick={() => { onChange(`${h}:${selM}`); }}>
                  {h}
                </div>
              ))}
            </div>
            <div ref={mnRef} style={colStyle}>
              {minutes.map(m => (
                <div key={m} data-sel={m===selM?'1':undefined}
                  style={itemStyle(m===selM)}
                  onClick={() => { onChange(`${selH}:${m}`); }}>
                  {m}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Task Row ──────────────────────────────────────────────────────────────
function TaskRow({ task, onToggle, onEdit, onDelete, dragHandlers, compact, showNotes }) {
  const T = useTheme();
  const [hov, setHov] = useState(false);
  const isMobile = useMedia('(max-width: 640px)');

  const catColors = T.mode === 'dark' ? CAT_D : CAT_L;
  const priColors = T.mode === 'dark' ? PRI_D : PRI_L;
  const pri = priColors[task.priority] || priColors.medium;

  const d = new Date(task.date + 'T00:00:00');
  const isToday = sameDay(d, TODAY);
  const isPast = d < TODAY && !isToday;
  const diffDays = Math.round((d - TODAY) / 86400000);
  const isSoon = diffDays > 0 && diffDays <= 2;

  const dateLabel = isToday ? 'Today'
    : sameDay(d, addDays(TODAY, 1)) ? 'Tomorrow'
    : sameDay(d, addDays(TODAY, -1)) ? 'Yesterday'
    : isPast ? `${Math.abs(diffDays)}d overdue`
    : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  return (
    <div
      draggable={!isMobile}
      {...(isMobile ? {} : dragHandlers)}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        display:'flex', gap:12, alignItems:'flex-start',
        padding: compact ? '10px 12px' : '14px 14px',
        background:T.surface, border:`1px solid ${T.border}`, borderRadius:10,
        transition:'all .15s', opacity:task.done?0.55:1,
        cursor: isMobile ? 'default' : 'grab',
      }}>
      {!isMobile && (
        <span style={{ color:T.grip, cursor:'grab', marginTop:2, flexShrink:0, display:'flex', alignItems:'center' }}>
          <Icon name="grip" size={14} color={T.grip}/>
        </span>
      )}
      <button onClick={()=>onToggle(task.id)}
        style={{ width:22, height:22, borderRadius:6, border:`1.5px solid ${task.done?T.accent:T.border2}`, background:task.done?T.accent:'transparent', cursor:'pointer', flexShrink:0, marginTop:1, display:'flex', alignItems:'center', justifyContent:'center', padding:0 }}>
        {task.done && <Icon name="check" size={11} color="#fff"/>}
      </button>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:7, marginBottom:compact?3:5 }}>
          <span style={{ fontWeight:600, fontSize:14, color:task.done?T.textSub:T.text, textDecoration:task.done?'line-through':'none', transition:'color .15s' }}>{task.title}</span>
          {task.repeat && task.repeat !== 'none' && <Icon name="repeat" size={10} color={T.textSub}/>}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
          <span style={{ fontSize:12, color:T.textSub }}>{dateLabel}{task.time?` · ${task.time}`:''}</span>
          <Badge label={task.priority} bg={pri.bg} color={pri.text}/>
          {task.repeat && task.repeat !== 'none' && <Badge label={REPEAT_LBL[task.repeat]} bg={T.accentSoft} color={T.accent}/>}
          {isSoon && !isToday && <Badge label="Due soon" bg="rgba(245,158,11,0.14)" color="#f59e0b"/>}
          {isPast && !task.done && <Badge label="Overdue" bg="rgba(239,68,68,0.12)" color="#ef4444"/>}
        </div>
        {showNotes && task.note && <div style={{ fontSize:12, color:T.textSub, marginTop:5 }}>{task.note}</div>}
      </div>
      <div style={{ display:'flex', gap:2, opacity: isMobile ? 1 : (hov ? 1 : 0), transition:'opacity .15s', flexShrink:0 }}>
        <button onClick={()=>onEdit(task)} style={{ background:'none', border:'none', cursor:'pointer', padding:6, borderRadius:6 }} title="Edit"><Icon name="pencil" size={13} color={T.textSub}/></button>
        <button onClick={()=>onDelete(task.id)} style={{ background:'none', border:'none', cursor:'pointer', padding:6, borderRadius:6 }} title="Delete"><Icon name="x" size={13} color={T.textSub}/></button>
      </div>
    </div>
  );
}

// ─── Task Panel (list view) ────────────────────────────────────────────────
function TaskPanel({ tasks, activeFilter, activeCat, onToggle, onEdit, onDelete, onReorder, compact, showNotes, search }) {
  const T = useTheme();
  const todayKey = dayKey(TODAY);
  const dragSrc = useRef(null);
  const isMobile = useMedia('(max-width: 640px)');

  const filtered = tasks.filter(t => {
    if (search.trim()) {
      const q = search.toLowerCase();
      if (!t.title.toLowerCase().includes(q) && !(t.note||'').toLowerCase().includes(q)) return false;
      if (activeCat !== 'All' && t.category !== activeCat) return false;
      return true;
    }
    if (activeCat !== 'All' && t.category !== activeCat) return false;
    if (activeFilter === 'Completed') return t.done;
    if (activeFilter === 'Today')     return t.date === todayKey;
    if (activeFilter === 'Upcoming') {
      if (!t.date) return !t.done;
      const d = new Date(t.date + 'T00:00:00');
      return !t.done && d >= TODAY;
    }
    return true;
  });

  const groupMap = {};
  filtered.forEach(t => {
    let lbl;
    if (!t.date) lbl = 'NO DATE';
    else {
      const d = new Date(t.date+'T00:00:00');
      lbl = sameDay(d,TODAY) ? 'TODAY'
          : sameDay(d,addDays(TODAY,1)) ? 'TOMORROW'
          : t.date;
    }
    if (!groupMap[lbl]) groupMap[lbl] = { list: [], sort: t.date || '9999' };
    groupMap[lbl].list.push(t);
  });
  const groups = Object.entries(groupMap).sort((a,b)=>a[1].sort.localeCompare(b[1].sort));

  const makeDrag = (taskId) => ({
    onDragStart(e) { dragSrc.current = taskId; e.dataTransfer.effectAllowed = 'move'; e.currentTarget.style.opacity = '0.4'; },
    onDragEnd(e) { e.currentTarget.style.opacity = '1'; document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over')); },
    onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); },
    onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); },
    onDrop(e) {
      e.preventDefault(); e.currentTarget.classList.remove('drag-over');
      const src = dragSrc.current; const dst = taskId; if (src === dst) return;
      const arr = [...tasks];
      const si = arr.findIndex(t => t.id === src);
      const di = arr.findIndex(t => t.id === dst);
      if (si === -1 || di === -1) return;
      const [rm] = arr.splice(si, 1);
      arr.splice(di, 0, rm);
      onReorder(arr);
    },
  });

  return (
    <div style={{ flex:1, overflowY:'auto', padding: isMobile ? '18px 16px' : '28px 32px' }}>
      {groups.length === 0 && (
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:200, gap:8 }}>
          <span style={{ fontSize:28, opacity:.3 }}>✓</span>
          <span style={{ color:T.textSub, fontSize:14 }}>No tasks here</span>
        </div>
      )}
      {groups.map(([lbl,{list}]) => (
        <div key={lbl} style={{ marginBottom:28 }}>
          <div style={{ fontSize:11, fontWeight:700, color:T.textDim, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:10 }}>{lbl}</div>
          <div style={{ display:'flex', flexDirection:'column', gap: compact ? 4 : 7 }}>
            {list.map(t => <TaskRow key={t.id} task={t} onToggle={onToggle} onEdit={onEdit} onDelete={onDelete} dragHandlers={makeDrag(t.id)} compact={compact} showNotes={showNotes}/>)}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Calendar Panel (month) ────────────────────────────────────────────────
function CalendarPanel({ tasks, month, year, onPrev, onNext, onDateClick }) {
  const T = useTheme();
  const isMobile = useMedia('(max-width: 640px)');
  const DAYS_FULL = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const DAYS_SHORT = ['S','M','T','W','T','F','S'];
  const DAYS = isMobile ? DAYS_SHORT : DAYS_FULL;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const cells = [];
  for (let i=0; i<firstDay; i++) cells.push({ day: daysInPrev-firstDay+i+1, cur:false, prev:true });
  for (let d=1; d<=daysInMonth; d++) cells.push({ day:d, cur:true });
  const rem = 42 - cells.length;
  for (let d=1; d<=rem; d++) cells.push({ day:d, cur:false, next:true });

  const byDay = {};
  tasks.forEach(t => { if(!t.date) return; if(!byDay[t.date]) byDay[t.date] = []; byDay[t.date].push(t); });

  const catColors = T.mode === 'dark' ? CAT_D : CAT_L;
  const navBtn = { background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, width:34, height:34, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 };
  const maxChips = isMobile ? 2 : 3;

  return (
    <div style={{ flex:1, padding: isMobile ? '18px 12px' : '28px 32px', display:'flex', flexDirection:'column' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:22 }}>
        <button onClick={onPrev} style={navBtn}><Icon name="chevLeft" size={15} color={T.textSub}/></button>
        <span style={{ fontWeight:700, fontSize: isMobile ? 15 : 17, color:T.text }}>{MONTHS_LONG[month]} {year}</span>
        <button onClick={onNext} style={navBtn}><Icon name="chevRight" size={15} color={T.textSub}/></button>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', marginBottom:8 }}>
        {DAYS.map((d,i) => <div key={i} style={{ textAlign:'center', fontSize: isMobile ? 11 : 12, color:T.textSub, fontWeight:500, padding:'4px 0' }}>{d}</div>)}
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap: isMobile ? 3 : 5, flex:1 }}>
        {cells.map((cell, i) => {
          const m = cell.prev ? month-1 : cell.next ? month+1 : month;
          const y2 = m<0 ? year-1 : m>11 ? year+1 : year;
          const mm = ((m%12)+12)%12;
          const key = `${y2}-${String(mm+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}`;
          const ct = byDay[key] || [];
          const isToday = key === dayKey(TODAY);
          return (
            <div key={i} onClick={()=>onDateClick(key)}
              style={{ background: isToday ? (T.mode==='dark' ? '#1e2a45' : T.accentSoft) : T.surface, border:`1px solid ${isToday ? T.accent : T.border}`, borderRadius:9, padding: isMobile ? '5px 6px' : '8px 9px', minHeight: isMobile ? 60 : 90, cursor:'pointer', transition:'background .12s', overflow:'hidden' }}>
              <div style={{ fontSize: isMobile ? 11 : 12, fontWeight: isToday ? 700 : 500, color: isToday ? T.accent : cell.cur ? T.text : T.textDim, marginBottom:4 }}>{cell.day}</div>
              <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
                {ct.slice(0, maxChips).map(t => {
                  const c = catColors[t.category] || catColors.Work;
                  return <div key={t.id} style={{ background:c.bg, borderRadius:4, padding: isMobile ? '1px 4px' : '2px 6px', fontSize: isMobile ? 9 : 10, color:c.text, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', fontWeight:500 }}>{t.title}</div>;
                })}
                {ct.length > maxChips && <div style={{ fontSize: isMobile ? 8 : 9, color:T.textSub }}>+{ct.length - maxChips} more</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Year Panel ────────────────────────────────────────────────────────────
function YearPanel({ tasks, year, onPrevYear, onNextYear, onMonthClick }) {
  const T = useTheme();
  const isMobile = useMedia('(max-width: 640px)');
  const catColors = T.mode === 'dark' ? CAT_D : CAT_L;
  const byDay = {};
  tasks.forEach(t => { if(!t.date) return; if(!byDay[t.date]) byDay[t.date] = []; byDay[t.date].push((catColors[t.category] || catColors.Work).dot); });
  const todayKey = dayKey(TODAY);
  const navBtn = { background:T.surface, border:`1px solid ${T.border}`, borderRadius:9, width:34, height:34, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 };
  const gridCols = isMobile ? 2 : 4;

  return (
    <div style={{ flex:1, padding: isMobile ? '18px 16px' : '28px 32px', overflowY:'auto' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:28 }}>
        <button onClick={onPrevYear} style={navBtn}><Icon name="chevLeft" size={15} color={T.textSub}/></button>
        <span style={{ fontWeight:700, fontSize:20, color:T.text, letterSpacing:'-0.02em' }}>{year}</span>
        <button onClick={onNextYear} style={navBtn}><Icon name="chevRight" size={15} color={T.textSub}/></button>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:`repeat(${gridCols},1fr)`, gap:16 }}>
        {Array.from({length:12}, (_,mi) => {
          const isCurrentMonth = mi===TODAY.getMonth() && year===TODAY.getFullYear();
          const firstDay = new Date(year, mi, 1).getDay();
          const daysInMonth = new Date(year, mi+1, 0).getDate();
          const daysInPrev = new Date(year, mi, 0).getDate();
          const cells = [];
          for (let i=0; i<firstDay; i++) cells.push({ day: daysInPrev-firstDay+i+1, cur:false });
          for (let d=1; d<=daysInMonth; d++) cells.push({ day:d, cur:true });
          while (cells.length < 35) cells.push({ day: cells.length-firstDay-daysInMonth+1, cur:false });
          const monthStr = `${year}-${String(mi+1).padStart(2,'0')}`;
          const monthTasks = tasks.filter(t => t.date && t.date.startsWith(monthStr));
          return (
            <div key={mi} onClick={()=>onMonthClick(mi)}
              style={{ background:T.surface, border:`1px solid ${isCurrentMonth?T.accent:T.border}`, borderRadius:12, padding:'14px 14px 12px', cursor:'pointer', transition:'all .15s' }}>
              <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:10 }}>
                <span style={{ fontSize:13, fontWeight:700, color:isCurrentMonth?T.accent:T.text }}>{MONTHS_LONG[mi]}</span>
                {monthTasks.length > 0 && <span style={{ fontSize:10, color:T.textSub }}>{monthTasks.length} task{monthTasks.length!==1?'s':''}</span>}
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', marginBottom:4 }}>
                {['S','M','T','W','T','F','S'].map((d,i) => <div key={i} style={{ textAlign:'center', fontSize:8, color:T.textDim, fontWeight:600 }}>{d}</div>)}
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:1 }}>
                {cells.map((cell, ci) => {
                  const key = cell.cur ? `${year}-${String(mi+1).padStart(2,'0')}-${String(cell.day).padStart(2,'0')}` : null;
                  const dots = key ? (byDay[key] || []) : [];
                  const isTod = key === todayKey;
                  return (
                    <div key={ci} style={{ display:'flex', flexDirection:'column', alignItems:'center', padding:'1px 0', borderRadius:3, background:isTod?T.accentSoft:'transparent' }}>
                      <span style={{ fontSize:8, color:isTod?T.accent:cell.cur?T.textSub:T.textDim, fontWeight:isTod?700:400, lineHeight:'12px' }}>{cell.cur?cell.day:''}</span>
                      {dots.length > 0 && <div style={{ display:'flex', gap:1, marginTop:1 }}>{dots.slice(0,3).map((col,di) => <div key={di} style={{ width:3, height:3, borderRadius:'50%', background:col }}></div>)}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────
function App() {
  // Auth state
  const [authStatus, setAuthStatus] = useState('loading'); // 'loading' | 'signed-in' | 'signed-out'
  const [user, setUser] = useState(null);
  const [loginErr, setLoginErr] = useState('');

  useEffect(() => {
    return FB.onAuthStateChanged(FB.auth, u => {
      setUser(u);
      setAuthStatus(u ? 'signed-in' : 'signed-out');
    });
  }, []);

  const signIn = async () => {
    setLoginErr('');
    try { await FB.signInWithPopup(FB.auth, FB.provider); }
    catch (e) { setLoginErr('Sign-in failed. Please try again.'); }
  };

  const handleSignOut = async () => {
    await FB.signOut(FB.auth);
  };

  // Prefs (theme, accent, etc.)
  const [prefs, setPref] = usePrefs();
  const dark = prefs.darkMode;
  const baseTheme = dark ? DARK : LIGHT;
  const T = useMemo(() => ({ ...baseTheme, accent: prefs.accentColor, accentSoft: prefs.accentColor + '22' }), [baseTheme, prefs.accentColor]);

  useEffect(() => {
    document.body.style.background = T.bg;
    document.body.style.color = T.text;
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', T.bg);
  }, [T.bg, T.text]);

  // UI state (only relevant when signed in, but fine to keep at top level)
  const { tasks, loaded, syncState, addTask, updateTask, deleteTask, toggleTask, reorderTasks } = useFirestoreTasks(user);

  const [view, setView]         = useState('list');
  const [filter, setFilter]     = useState('Upcoming');
  const [cat, setCat]           = useState('All');
  const [modal, setModal]       = useState(null);
  const [calMonth, setCalMonth] = useState(TODAY.getMonth());
  const [calYear, setCalYear]   = useState(TODAY.getFullYear());
  const [calView, setCalView]   = useState('month');
  const [dayModal, setDayModal] = useState(null);
  const [search, setSearch]     = useState('');
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [drawerOpen, setDrawerOpen] = useState(false);

  const isMobile = useMedia('(max-width: 900px)');

  const saveTask = (form) => {
    if (modal && modal.id) updateTask(modal.id, form);
    else addTask(form);
    setModal(null);
  };

  const handleDelete = (id) => {
    if (!confirm('Delete this task?')) return;
    deleteTask(id);
  };

  if (authStatus === 'loading') {
    return <ThemeCtx.Provider value={T}><LoadingScreen/></ThemeCtx.Provider>;
  }
  if (authStatus === 'signed-out') {
    return <ThemeCtx.Provider value={T}><LoginScreen onSignIn={signIn} error={loginErr}/></ThemeCtx.Provider>;
  }

  const viewBtn = (v, label, icon) => (
    <button key={v} onClick={()=>setView(v)}
      style={{ display:'flex', alignItems:'center', gap:6, padding: isMobile ? '8px 12px' : '8px 18px', border:'none', background: view===v ? T.surface3 : 'transparent', color: view===v ? T.text : T.textSub, fontSize:13, fontWeight:500, cursor:'pointer', transition:'all .15s', fontFamily:'Inter,sans-serif' }}>
      <Icon name={icon} size={14} color={view===v ? T.text : T.textSub}/>
      {!isMobile && label}
    </button>
  );

  const sidebarNode = (
    <Sidebar user={user} tasks={tasks} activeFilter={filter} activeCat={cat}
      onSetFilter={setFilter} onSetCat={setCat}
      onAdd={()=>setModal('add')}
      onGoList={()=>setView('list')}
      search={search} onSearch={setSearch}
      onOpenSettings={()=>setSettingsOpen(true)}
      onSignOut={handleSignOut}
      onCloseDrawer={()=>setDrawerOpen(false)}
      isMobile={isMobile}
    />
  );

  return (
    <ThemeCtx.Provider value={T}>
      <div style={{ display:'flex', height:'100vh', overflow:'hidden', background:T.bg }}>

        {/* Desktop sidebar — always visible */}
        {!isMobile && (
          <div style={{ background:T.sidebar, borderRight:`1px solid ${T.border}`, display:'flex', flexDirection:'column', overflowY:'auto' }}>
            {sidebarNode}
          </div>
        )}

        {/* Mobile drawer */}
        {isMobile && drawerOpen && (
          <div style={{ position:'fixed', inset:0, zIndex:300 }}>
            <div onClick={()=>setDrawerOpen(false)}
              style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.5)', backdropFilter:'blur(3px)' }}/>
            <div style={{ position:'absolute', top:0, left:0, bottom:0, background:T.sidebar, borderRight:`1px solid ${T.border}`, overflowY:'auto', boxShadow:`4px 0 20px ${T.shadow}` }}>
              {sidebarNode}
            </div>
          </div>
        )}

        {/* Main */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>

          {/* Top bar */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding: isMobile ? '0 12px' : '0 32px', borderBottom:`1px solid ${T.border}`, height:52, flexShrink:0, background:T.bg, gap:8 }}>
            <div style={{ display:'flex', alignItems:'center', gap: isMobile ? 4 : 0 }}>
              {isMobile && (
                <button onClick={()=>setDrawerOpen(true)}
                  style={{ background:'none', border:'none', cursor:'pointer', padding:8, borderRadius:6, display:'flex', alignItems:'center', marginRight:4 }}>
                  <Icon name="menu" size={18} color={T.text}/>
                </button>
              )}
              {viewBtn('list', 'List', 'list')}
              {viewBtn('calendar', 'Calendar', 'calendar')}
            </div>
            <div style={{ display:'flex', alignItems:'center', gap: isMobile ? 8 : 12 }}>
              {view==='calendar' && !isMobile && (
                <div style={{ display:'flex', background:T.surface2, borderRadius:8, border:`1px solid ${T.border}`, overflow:'hidden' }}>
                  {['month','year'].map(cv => (
                    <button key={cv} onClick={()=>setCalView(cv)}
                      style={{ padding:'5px 14px', border:'none', background: calView===cv ? T.surface3 : 'transparent', color: calView===cv ? T.text : T.textSub, fontSize:12, fontWeight: calView===cv ? 600 : 400, cursor:'pointer', transition:'all .15s', fontFamily:'Inter,sans-serif', textTransform:'capitalize' }}>
                      {cv}
                    </button>
                  ))}
                </div>
              )}
              {view==='calendar' && isMobile && (
                <select value={calView} onChange={e=>setCalView(e.target.value)}
                  style={{ padding:'4px 8px', borderRadius:6, border:`1px solid ${T.border}`, background:T.surface2, color:T.text, fontSize:12, fontFamily:'Inter,sans-serif' }}>
                  <option value="month">Month</option>
                  <option value="year">Year</option>
                </select>
              )}
              <SyncDot state={syncState}/>
            </div>
          </div>

          {/* Content */}
          <div style={{ flex:1, overflowY:'auto', display:'flex', flexDirection:'column' }}>
            {!loaded ? (
              <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:14, color:T.textSub }}>
                <div className="spinner"/>
                <span style={{ fontSize:13 }}>Loading your tasks…</span>
              </div>
            ) : view==='list' ? (
              <TaskPanel tasks={tasks} activeFilter={filter} activeCat={cat}
                onToggle={toggleTask} onEdit={t=>setModal(t)} onDelete={handleDelete}
                onReorder={reorderTasks}
                compact={prefs.compact} showNotes={prefs.showNotes} search={search}/>
            ) : calView==='year' ? (
              <YearPanel tasks={tasks} year={calYear}
                onPrevYear={()=>setCalYear(y=>y-1)} onNextYear={()=>setCalYear(y=>y+1)}
                onMonthClick={mi=>{ setCalMonth(mi); setCalView('month'); }}/>
            ) : (
              <CalendarPanel tasks={tasks} month={calMonth} year={calYear}
                onPrev={()=>{ if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1); }}
                onNext={()=>{ if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1); }}
                onDateClick={key=>{ const ts=tasks.filter(t=>t.date===key); if(ts.length) setDayModal({key,ts}); else setModal({_preDate:key}); }}/>
            )}
          </div>
        </div>
      </div>

      {/* Modals */}
      {(modal==='add' || (modal && modal.id) || (modal && modal._preDate)) && (
        <TaskModal
          task={modal==='add' || modal._preDate ? null : modal}
          defaultDate={modal._preDate || null}
          onSave={saveTask} onClose={()=>setModal(null)}/>
      )}
      {dayModal && (
        <DayModal dateKey={dayModal.key} tasks={dayModal.ts}
          onToggle={toggleTask} onEdit={t=>setModal(t)} onDelete={handleDelete}
          onClose={()=>setDayModal(null)}
          onAdd={()=>{ setDayModal(null); setModal({_preDate: dayModal.key}); }}/>
      )}
      {settingsOpen && (
        <SettingsModal prefs={prefs} setPref={setPref} onClose={()=>setSettingsOpen(false)}/>
      )}
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
